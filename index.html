<!DOCTYPE html>
<html>
<head>
    <title>Hospital Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: white;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background-color: #34495e;
            padding: 10px;
            text-align: center;
        }

        nav button {
            background-color: #1abc9c;
            border: none;
            padding: 10px 15px;
            margin: 5px;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }

        nav button:hover {
            background-color: #16a085;
        }

        .container {
            padding: 20px;
        }

        .form-section {
            display: none;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            max-width: 500px;
            margin: auto;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button.submit-btn {
            background-color: #2980b9;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button.submit-btn:hover {
            background-color: #1f6391;
        }

        .active {
            display: block;
        }
    </style>

    <script>
        function showSection(id) {
            var sections = document.getElementsByClassName("form-section");
            for (var i = 0; i < sections.length; i++) {
                sections[i].classList.remove("active");
            }
            document.getElementById(id).classList.add("active");
        }
    </script>
</head>

<body>

<header>
    <h1>Hospital Management System</h1>
</header>

<nav>
    <button onclick="showSection('login')">Login</button>
    <button onclick="showSection('patient')">Register Patient</button>
    <button onclick="showSection('doctor')">Add Doctor</button>
    <button onclick="showSection('appointment')">Book Appointment</button>
</nav>

<div class="container">

    <!-- Login Form -->
    <div id="login" class="form-section active">
        <h2>Login</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button class="submit-btn">Login</button>
    </div>

    <!-- Patient Registration -->
    <div id="patient" class="form-section">
        <h2>Register Patient</h2>
        <input type="text" placeholder="Full Name">
        <input type="number" placeholder="Age">
        <select>
            <option>Gender</option>
            <option>Male</option>
            <option>Female</option>
        </select>
        <input type="text" placeholder="Phone Number">
        <input type="text" placeholder="Address">
        <button class="submit-btn">Register</button>
    </div>

    <!-- Add Doctor -->
    <div id="doctor" class="form-section">
        <h2>Add Doctor</h2>
        <input type="text" placeholder="Doctor Name">
        <input type="text" placeholder="Specialization">
        <input type="text" placeholder="Phone Number">
        <button class="submit-btn">Add Doctor</button>
    </div>

    <!-- Appointment -->
    <div id="appointment" class="form-section">
        <h2>Book Appointment</h2>
        <input type="text" placeholder="Patient ID">
        <input type="text" placeholder="Doctor ID">
        <input type="date">
        <input type="time">
        <button class="submit-btn">Book Appointment</button>
    </div>

</div>

</body>
</html>
